[project]
name = "corporate-bankruptcy-ml"
version = "0.1.0"
description = "Corporate bankruptcy prediction using logistic regression and tree-based machine learning models."
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "win-64", "linux-64"]

[tasks]
build = "pytask"
test = "pytest"
lint = "ruff check ."
format = "ruff format ."

[dependencies]
python = "3.11.*"
pandas = "*"
numpy = "*"
scikit-learn = "*"
matplotlib = "*"
seaborn = "*"
scipy = "*"
joblib = "*"
pytask = "*"
pytest = "*"
ruff = "*"
ipykernel = "*"
jupyterlab = "*"